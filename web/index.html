<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Beacon — Voice Assistant</title>
<style>
  :root{ --bg:#0e1320; --panel:#171e2e; --line:#2a3450; --txt:#eef3fb;
         --muted:#94a3bd; --accent:#6aa6ff; --you:#1f3a63; --beacon:#16324a;
         --confirm:#4a3a12; --ok:#143a2b; --bad:#4a1f1f; }
  *{box-sizing:border-box}
  body{margin:0;font:18px/1.6 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--txt)}
  header{padding:16px 22px;border-bottom:1px solid var(--line);display:flex;gap:12px;align-items:center;background:var(--panel)}
  header h1{font-size:20px;margin:0}
  header .tag{font-size:12px;color:var(--muted);border:1px solid var(--line);padding:3px 9px;border-radius:20px}
  .wrap{max-width:820px;margin:0 auto;padding:22px}
  #status{font-size:14px;color:var(--muted);margin-bottom:12px;min-height:20px}
  #transcript{min-height:300px}
  .turn{padding:13px 16px;border-radius:14px;margin:12px 0;max-width:88%;font-size:18px}
  .you{background:var(--you);margin-left:auto;border-bottom-right-radius:4px}
  .beacon{background:var(--beacon);border-bottom-left-radius:4px}
  .confirm{background:var(--confirm);border:1px solid #8a6d2a}
  .outcome{background:var(--ok);border:1px solid #2c6e52;font-weight:600}
  .system{background:transparent;border:1px dashed var(--line);color:var(--muted);font-size:14px;text-align:center;margin:8px auto;max-width:70%}
  .who{font-size:12px;color:var(--muted);margin-bottom:3px}
  .controls{position:sticky;bottom:0;background:var(--panel);border-top:1px solid var(--line);padding:16px 22px}
  .controls .inner{max-width:820px;margin:0 auto;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  button{cursor:pointer;border:none;border-radius:12px;font:inherit;font-weight:700;color:#fff;padding:14px 20px}
  .mic{background:var(--accent);font-size:18px}
  .mic.listening{background:#e0533b;animation:pulse 1.1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
  .yes{background:#2c9c6a}.no{background:#c0493b}.repeat{background:#3a4a6a}
  .new{background:#3a4a6a}
  input[type=text]{flex:1;min-width:200px;background:var(--bg);border:1px solid var(--line);color:var(--txt);border-radius:12px;padding:13px;font:inherit}
  .row2{max-width:820px;margin:8px auto 0;display:flex;gap:14px;align-items:center;color:var(--muted);font-size:14px}
  input[type=range]{width:160px}
  .hint{color:var(--muted);font-size:14px;text-align:center;margin-top:30px}
  .stopspk{background:#5a4a6a}
  a{color:var(--accent)}
</style>
</head>
<body>
<header>
  <h1>Beacon</h1>
  <span class="tag">Voice Assistant — prototype</span>
  <span id="live" class="tag" style="margin-left:auto"></span>
</header>

<div class="wrap">
  <div id="status">Click Speak and just talk to Beacon about anything. Say “bye” when you’re done.</div>
  <div id="transcript"></div>
  <div class="hint" id="hint">Beacon listens, talks back, and keeps the conversation going.
    Voice works in Chrome/Edge; you can also type below.</div>
</div>

<div class="controls">
  <div class="inner">
    <button id="micBtn" class="mic" onclick="toggleMic()">Speak</button>
    <input id="textIn" type="text" placeholder="…or type here and press Enter"
           onkeydown="if(event.key==='Enter')sendText()">
    <button class="stopspk" onclick="stopSpeaking()">Stop voice</button>
    <button class="new" onclick="newConversation()">New conversation</button>
  </div>
  <div class="row2">
    <label>Speaking speed <input type="range" id="rate" min="0.6" max="1.4" step="0.1" value="1"></label>
    <label><input type="checkbox" id="autolisten" checked> auto-listen after a question</label>
  </div>
</div>

<script>
let sessionId=null, status=null, spoken=new Set(), speaking=false, ttsQueue=[], speechRun=0;
const synth = window.speechSynthesis;
const SPOKEN_KINDS = new Set(["narration","confirm","outcome"]);

// ---------- API ----------
async function api(method,path,body){
  const o={method,headers:{'Content-Type':'application/json'}};
  if(body)o.body=JSON.stringify(body);
  return (await fetch(path,o)).json();
}

// ---------- TTS ----------
function enqueueSpeak(text){
  ttsQueue.push(text);
  if(!speaking) drainQueue();
}
function drainQueue(){
  if(!ttsQueue.length){speaking=false; maybeAutoListen(); return;}
  speaking=true;
  const u=new SpeechSynthesisUtterance(ttsQueue.shift());
  const run=speechRun;
  u.rate=parseFloat(document.getElementById('rate').value||'1');
  // cancel() can still fire an event for an old utterance. Ignore that event so
  // it cannot resume the queue after the user explicitly stopped voice output.
  u.onend=()=>{ if(run===speechRun) drainQueue(); };
  u.onerror=()=>{ if(run===speechRun) drainQueue(); };
  synth.speak(u);
}
function stopSpeaking(){
  speechRun++;
  synth.cancel();
  ttsQueue=[];
  speaking=false;
  setStatus('Voice output stopped.');
}

function newConversation(){
  // Preserve the previous server-side session as an auditable transcript, while
  // making the next typed/spoken message create an entirely new session.
  if(listening && rec) rec.stop();
  stopSpeaking();
  sessionId=null;
  status=null;
  spoken=new Set();
  document.getElementById('transcript').innerHTML='';
  document.getElementById('live').textContent='';
  setStatus('Fresh conversation ready. Click Speak or type a new goal.');
  setMic(false);
}

// ---------- STT ----------
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let rec=null, listening=false;
function toggleMic(){
  if(!SR){ alert("Speech input needs Chrome or Edge. You can type instead."); return; }
  if(listening){ rec && rec.stop(); return; }
  startListening();
}
function startListening(){
  if(!SR) return;
  stopSpeaking();           // don't transcribe our own voice
  rec=new SR(); rec.lang='en-US'; rec.interimResults=false; rec.maxAlternatives=1;
  listening=true; setMic(true);
  rec.onresult=e=>{ const said=e.results[0][0].transcript; handleSpeech(said); };
  rec.onerror=()=>{}; rec.onend=()=>{ listening=false; setMic(false); };
  rec.start();
}
function setMic(on){
  const b=document.getElementById('micBtn');
  b.classList.toggle('listening',on);
  b.textContent = on ? 'Listening…' : (sessionId&&!terminal()? 'Answer':'Speak');
}
function maybeAutoListen(){
  if(!document.getElementById('autolisten').checked) return;
  if(SR && (status==='conversing'||status==='confirming_intent'||status==='awaiting_confirmation') && !listening){
    setTimeout(startListening, 350);
  }
}

// ---------- routing user input ----------
function handleSpeech(text){
  showLocalUser(text);
  if(!sessionId || terminal()){ startSession(text); }
  else { respond(text); }
}
function quick(w){ if(!sessionId){return;} showLocalUser(w); respond(w); }
function sendText(){
  const el=document.getElementById('textIn'); const t=el.value.trim(); if(!t)return; el.value='';
  handleSpeech(t);
}
function showLocalUser(text){  // optimistic echo (server also records it)
  const d=document.getElementById('transcript');
  const div=document.createElement('div'); div.className='turn you';
  div.innerHTML='<div class="who">you</div>'+escapeHtml(text);
  d.appendChild(div); window.scrollTo(0,document.body.scrollHeight);
}

async function startSession(goal){
  setStatus('Understanding your request…');
  const r=await api('POST','/api/sessions',{goal});
  sessionId=r.session_id; spoken=new Set();
}
async function respond(text){ await api('POST','/api/sessions/'+sessionId+'/respond',{text}); }

// ---------- render / poll ----------
function terminal(){ return ['done','abandoned','error'].includes(status); }
async function poll(){
  if(!sessionId) return;
  const s=await api('GET','/api/sessions/'+sessionId);
  if(s.error) return;
  status=s.status;
  document.getElementById('live').textContent =
    status==='planning' ? 'thinking…' :
    (status==='conversing'||status==='awaiting_confirmation'||status==='confirming_intent') ? 'your turn' :
    terminal()? status : '';
  renderServer(s.transcript||[]);
  setStatusForState();
  setMic(listening);
}
function renderServer(turns){
  const d=document.getElementById('transcript');
  // server transcript is authoritative; rebuild once it has caught up
  // (keep it simple: re-render fully, then speak any unspoken spoken-turns)
  let html='';
  turns.forEach((t,i)=>{
    if(t.kind==='action') return; // internal
    const cls = t.kind==='user'?'you': t.kind==='confirm'?'confirm':
                t.kind==='outcome'?'outcome': t.kind==='system'?'system':'beacon';
    const who = t.kind==='user'?'you': t.kind==='system'?'':'Beacon';
    html+=`<div class="turn ${cls}">${who?`<div class="who">${who}</div>`:''}${escapeHtml(t.text)}</div>`;
  });
  d.innerHTML=html; window.scrollTo(0,document.body.scrollHeight);
  // speak new spoken-kind turns in order
  turns.forEach((t,i)=>{
    if(SPOKEN_KINDS.has(t.kind) && !spoken.has(i)){ spoken.add(i); enqueueSpeak(t.text); }
  });
}
function setStatusForState(){
  const m={conversing:'Your turn — just speak. Say “bye” when you’re done.',
           planning:'Beacon is thinking…',
           done:'Conversation ended. Click Speak to start again.',
           error:'Something went wrong.'};
  if(m[status]) setStatus(m[status]);
}
function setStatus(t){ document.getElementById('status').textContent=t; }
function escapeHtml(s){ return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

setInterval(poll, 1200);
</script>
</body>
</html>
